services:
  - type: web
    name: racing-game-backend
    env: python
    plan: free
    buildCommand: cd neon-racing/backend && pip install -r requirements.txt
    startCommand: cd neon-racing/backend && gunicorn --worker-class eventlet -w 1 run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: racing-game-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
databases:
  - name: racing-game-db
    plan: free
